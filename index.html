<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教師請假及代課記錄系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .table-scroll {
            -webkit-overflow-scrolling: touch;
        }
        /* 提示框動畫過渡效果 */
        .toast-transition {
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans relative">

    <!-- 🌟 自動消失的提示框 (Toast) 🌟 -->
    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 -translate-y-5 px-6 py-3 rounded-lg shadow-xl z-50 opacity-0 pointer-events-none toast-transition text-white font-bold text-center w-max max-w-sm">
        提示訊息
    </div>

    <!-- 頂部導航列 -->
    <nav class="bg-blue-600 text-white p-3 md:p-4 shadow-md sticky top-0 z-30">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-3">
            <h1 class="text-lg md:text-xl font-bold text-center w-full md:w-auto">
                教師請假及代課記錄 
                <span id="displayYear" class="text-blue-200 text-xs md:text-sm ml-1 block md:inline mt-1 md:mt-0">讀取中...</span>
            </h1>
            <div class="flex flex-wrap justify-center w-full md:w-auto gap-2">
                <button id="btn-tab-view" onclick="switchTab('tab-view')" class="nav-btn bg-blue-700 md:bg-transparent hover:bg-blue-500 px-3 py-2 md:py-1.5 rounded font-medium text-sm md:text-base transition-colors flex-1 md:flex-none text-center">查看記錄</button>
                <button id="btn-tab-record" onclick="switchTab('tab-record')" class="nav-btn bg-blue-700 md:bg-transparent hover:bg-blue-500 px-3 py-2 md:py-1.5 rounded font-medium text-sm md:text-base transition-colors flex-1 md:flex-none text-center flex items-center justify-center gap-1">🔒 記錄輸入</button>
                <button id="btn-tab-settings" onclick="switchTab('tab-settings')" class="nav-btn bg-blue-700 md:bg-transparent hover:bg-blue-500 px-3 py-2 md:py-1.5 rounded font-medium text-sm md:text-base transition-colors flex-1 md:flex-none text-center flex items-center justify-center gap-1">🔒 系統設定</button>
            </div>
        </div>
    </nav>

    <!-- 載入中提示 -->
    <div id="loading" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-6 rounded shadow-lg text-center mx-4">
            <p class="text-lg font-bold text-blue-600">系統載入中...</p>
        </div>
    </div>

    <!-- 教師詳細記錄彈出視窗 -->
    <div id="teacherModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40 hidden p-2 md:p-4">
        <div class="bg-white p-4 md:p-6 rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] md:max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 id="modalTitle" class="text-lg md:text-2xl font-bold text-blue-700">教師記錄明細</h3>
                <button onclick="closeTeacherModal()" class="text-gray-500 hover:text-red-500 text-3xl font-bold leading-none">&times;</button>
            </div>
            <div id="modalContent" class="overflow-y-auto flex-grow p-1 md:p-2 space-y-4">
                <!-- 明細內容由 JS 動態生成 -->
            </div>
            <div class="mt-4 border-t pt-4 text-right">
                <button onclick="closeTeacherModal()" class="bg-gray-500 text-white w-full md:w-auto px-6 py-3 md:py-2 rounded hover:bg-gray-600 text-lg md:text-base font-bold">關閉視窗</button>
            </div>
        </div>
    </div>

    <div class="container mx-auto p-3 md:p-6 mt-2 md:mt-4">

        <!-- 版面 2: 查看記錄 -->
        <div id="tab-view" class="tab-content hidden">
            <h2 class="text-xl md:text-2xl font-bold mb-4 md:mb-6 text-gray-700 flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-2">
                本學年統計表 
                <span class="text-xs md:text-sm font-normal text-gray-500 bg-yellow-100 px-2 py-1 rounded inline-block w-max">💡 點擊姓名可看明細</span>
            </h2>
            <div class="bg-white rounded-lg shadow-md overflow-x-auto table-scroll">
                <table class="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                        <!-- 🌟 這裡的表頭現在由 JS 動態生成 🌟 -->
                        <tr id="dynamicTableHeaders" class="bg-gray-200 text-gray-700 text-sm md:text-base">
                        </tr>
                    </thead>
                    <tbody id="summaryTableBody" class="text-sm md:text-base">
                        <!-- 資料由 JS 動態生成 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 版面 1: 記錄輸入 -->
        <div id="tab-record" class="tab-content hidden">
            <div class="max-w-2xl mx-auto">
                <h2 class="text-xl md:text-2xl font-bold mb-4 md:mb-6 text-gray-700">新增請假 / 代課記錄</h2>
                <div class="bg-white p-4 md:p-6 rounded-lg shadow-md">
                    <form id="recordForm" onsubmit="submitRecords(event)">
                        <div class="flex flex-col sm:flex-row gap-4 mb-6">
                            <div class="flex-1">
                                <label class="block text-gray-700 font-bold mb-2">1. 選擇教師</label>
                                <select id="teacherSelect" required class="w-full h-12 md:h-11 border border-gray-300 px-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg md:text-base bg-white">
                                    <option value="">請選擇...</option>
                                </select>
                            </div>
                            <div class="flex-1">
                                <label class="block text-gray-700 font-bold mb-2">2. 日期</label>
                                <input type="date" id="recordDate" required class="w-full h-12 md:h-11 border border-gray-300 px-3 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg md:text-base bg-white">
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <label class="block text-gray-700 font-bold mb-2">3. 記錄數量 <span class="text-sm font-normal text-gray-500 block md:inline">(請在需要的項目輸入節數)</span></label>
                            
                            <!-- 🌟 這裡的情況項目現在由 JS 動態生成 🌟 -->
                            <div id="dynamicFormItems" class="space-y-3 bg-gray-50 p-3 md:p-4 rounded-lg border border-gray-200">
                            </div>
                            
                        </div>
                        <button type="submit" class="bg-blue-600 text-white px-6 py-4 md:py-3 rounded-lg hover:bg-blue-700 w-full font-bold text-lg md:text-xl shadow-md transition-colors">提交當日記錄</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- 版面 3: 系統設定 -->
        <div id="tab-settings" class="tab-content hidden">
            <h2 class="text-xl md:text-2xl font-bold mb-4 md:mb-6 text-gray-700">系統設定</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
                <!-- 學年設定 -->
                <div class="bg-white p-4 md:p-6 rounded-lg shadow-md border-t-4 border-red-500">
                    <h2 class="text-lg md:text-xl font-bold mb-3 text-gray-700">1. 學年設定</h2>
                    <p class="text-xs md:text-sm text-gray-500 mb-4 bg-red-50 p-2 rounded border border-red-100">
                        注意：設定新學年將會<span class="text-red-500 font-bold">清除所有舊的記錄資料</span>，請確認已備份舊 Google Sheet。
                    </p>
                    <div class="flex flex-col sm:flex-row gap-2">
                        <input type="text" id="newYearInput" placeholder="例如: 2026-2027" class="border border-gray-300 p-3 md:p-2 rounded flex-grow text-lg md:text-base">
                        <button onclick="resetYear()" class="bg-red-500 text-white px-4 py-3 md:py-2 rounded hover:bg-red-600 font-bold text-lg md:text-base whitespace-nowrap">開啟新學年</button>
                    </div>
                </div>

                <!-- 老師設定 -->
                <div class="bg-white p-4 md:p-6 rounded-lg shadow-md border-t-4 border-green-500">
                    <h2 class="text-lg md:text-xl font-bold mb-3 text-gray-700">2. 教師名單設定</h2>
                    <div class="flex flex-col sm:flex-row gap-2 mb-6">
                        <input type="text" id="newTeacherInput" placeholder="輸入新教師姓名" class="border border-gray-300 p-3 md:p-2 rounded flex-grow text-lg md:text-base">
                        <button onclick="addTeacher()" class="bg-green-500 text-white px-4 py-3 md:py-2 rounded hover:bg-green-600 font-bold text-lg md:text-base whitespace-nowrap">新增教師</button>
                    </div>
                    
                    <h3 class="font-bold text-gray-600 mb-3 text-sm md:text-base">現有教師名單 <span class="text-xs font-normal text-gray-400">(點擊 x 移除)</span></h3>
                    <div id="teacherList" class="flex flex-wrap gap-2">
                        <!-- 教師名單由 JS 動態生成 -->
                    </div>
                </div>

                <!-- 🌟 全新：情況項目設定 🌟 -->
                <div class="bg-white p-4 md:p-6 rounded-lg shadow-md border-t-4 border-blue-500 lg:col-span-2">
                    <h2 class="text-lg md:text-xl font-bold mb-1 text-gray-700">3. 情況項目設定 <span class="text-sm font-normal text-gray-500">(自訂請假/代課類別)</span></h2>
                    <p class="text-xs md:text-sm text-gray-500 mb-4 bg-blue-50 p-2 rounded">
                        💡 這裡的設定將儲存在<b>這台電腦的瀏覽器中</b>。如果您使用另一台電腦，請確保兩邊的項目設定一致(需要手動在recordTypes中加入新的項目)，表格才能正確統計。分數將由系統自動根據設定計算。
                        <!-- 新增項目後需要手動在recordTypes中加入新的項目 -->
                    </p>
                    
                    <div class="flex flex-col md:flex-row gap-2 mb-6 bg-gray-50 p-3 md:p-4 rounded border border-gray-200 items-start md:items-center">
                        <input type="text" id="newTypeCode" placeholder="代號(如: f)" class="border border-gray-300 p-2 rounded w-full md:w-24 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="text" id="newTypeFullDesc" placeholder="完整說明 (如: f. 遲到扣分)" class="border border-gray-300 p-2 rounded flex-grow w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="text" id="newTypeShortDesc" placeholder="表格簡稱 (如: f. 遲到)" class="border border-gray-300 p-2 rounded w-full md:w-32 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="number" id="newTypeScore" placeholder="分數(如:-0.5)" step="0.5" class="border border-gray-300 p-2 rounded w-full md:w-28 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <select id="newTypeColor" class="border border-gray-300 p-2 rounded w-full md:w-32 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="border-gray-300">灰色 (一般)</option>
                            <option value="border-red-400">淺紅 (扣分)</option>
                            <option value="border-red-600">深紅 (多扣分)</option>
                            <option value="border-green-400">淺綠 (加分)</option>
                            <option value="border-green-600">深綠 (多加分)</option>
                        </select>
                        <button onclick="addRecordType()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 font-bold whitespace-nowrap w-full md:w-auto">新增項目</button>
                    </div>
                    

                    <h3 class="font-bold text-gray-600 mb-3 text-sm md:text-base">現有情況項目</h3>
                    <div id="settingsTypeList" class="space-y-2">
                        <!-- 情況項目清單由 JS 動態生成 -->
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- 系統邏輯腳本 -->
    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyqVbOVZEXSYS8x6sC-qLoE9AWHZUcw-ln7GQd5PKKY8ua_9KlkmBFp9DTUeGXNxC3FnA/exec';

        // 🛡️ 系統密碼設定
        const VP_PASSWORD = "535800"; 
        let isVPAuthenticated = false;

        let appData = { year: '', teachers: [], records: [] };
        
        // 🌟 動態情況項目清單陣列
        let recordTypes = [];

        // 用來追蹤 Toast 的計時器，避免快速連續點擊時動畫錯亂
        let toastTimeout; 

        window.onload = function() {
            setDefaultDate();
            initRecordTypes(); // 🌟 初始化載入動態項目
            switchTab('tab-view'); 
        };

        // 🌟 新增：初始化情況項目（從 LocalStorage 讀取或載入預設值）
        function initRecordTypes() {
            const stored = localStorage.getItem('appRecordTypes');
            if (stored) {
                recordTypes = JSON.parse(stored);
            } else {
                // 預設的 a-e 項目
                recordTypes = [
                    { code: 'a', fullDesc: 'a. 請三日病假 (只作記錄)', shortDesc: 'a. 3天病假(次)', score: 0, colorClass: 'border-gray-300' },
                    { code: 'b', fullDesc: 'b. 請一節班主任節/小息一及二/第十一節及課前當值(15分鐘) (-0.5分)', shortDesc: 'b. 請假(-0.5)', score: -0.5, colorClass: 'border-red-400' },
                    { code: 'c', fullDesc: 'c. 請假: 請一節第一至十課節、午膳及第小息三(30分鐘)(-1.0分)', shortDesc: 'c. 請假(-1.0)', score: -1.0, colorClass: 'border-red-600' },
                    { code: 'd', fullDesc: 'd. 代一節班主任節/小息一及二/第十一節及課前當值(15分鐘)(+0.5分)', shortDesc: 'd. 代課(+0.5)', score: 0.5, colorClass: 'border-green-400' },
                    { code: 'e', fullDesc: 'e. 代一節第一至十課節、午膳及第小息三(30分鐘)(+1.0分)', shortDesc: 'e. 代課(+1.0)', score: 1.0, colorClass: 'border-green-600' }
                ];
                saveRecordTypes(); 
                return; 
            }
            // 如果是從 Storage 讀取，需呼叫渲染
            renderRecordForm();
            renderTableHeaders();
            renderSettingsTypes();
        }

        function saveRecordTypes() {
            localStorage.setItem('appRecordTypes', JSON.stringify(recordTypes));
            // 儲存後同步更新介面
            renderRecordForm();
            renderTableHeaders();
            renderSettingsTypes();
            // 如果資料已經讀取完畢，同步更新統計表
            if (appData.teachers.length > 0) renderSummaryTable(); 
        }

        // 🌟 渲染：新增記錄的表單項目
        function renderRecordForm() {
            const container = document.getElementById('dynamicFormItems');
            let html = '';
            recordTypes.forEach(t => {
                html += `
                <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-white p-3 rounded shadow-sm gap-3 sm:gap-2 border-l-4 ${t.colorClass}">
                    <span class="text-gray-700 text-sm md:text-base font-medium sm:w-2/3 leading-snug">${t.fullDesc}</span>
                    <div class="flex items-center justify-end w-full sm:w-1/3">
                        <button type="button" onclick="changeQty('qty_${t.code}', -1)" class="bg-gray-200 px-4 py-2 rounded-l text-xl hover:bg-gray-300 transition-colors">-</button>
                        <input type="number" id="qty_${t.code}" value="0" min="0" class="w-16 md:w-12 text-center border-t border-b border-gray-200 py-2 text-lg">
                        <button type="button" onclick="changeQty('qty_${t.code}', 1)" class="bg-gray-200 px-4 py-2 rounded-r text-xl hover:bg-gray-300 transition-colors">+</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // 🌟 渲染：查看記錄表格的標題
        function renderTableHeaders() {
            const thead = document.getElementById('dynamicTableHeaders');
            let html = '<th class="p-2 md:p-3 border-b whitespace-nowrap sticky left-0 bg-gray-200 z-10">教師姓名</th>';
            recordTypes.forEach(t => {
                let textColor = 'text-gray-700';
                if(t.score < 0) textColor = 'text-red-600';
                if(t.score > 0) textColor = 'text-green-600';
                html += `<th class="p-2 md:p-3 border-b whitespace-nowrap ${textColor}">${t.shortDesc}</th>`;
            });
            html += '<th class="p-2 md:p-3 border-b whitespace-nowrap font-bold text-blue-600">總分</th>';
            thead.innerHTML = html;
        }

        // 🌟 渲染：系統設定中的項目清單
        function renderSettingsTypes() {
            const list = document.getElementById('settingsTypeList');
            list.innerHTML = '';
            recordTypes.forEach(rt => {
                list.innerHTML += `
                    <div class="flex flex-col sm:flex-row justify-between sm:items-center p-3 border-b bg-white rounded shadow-sm gap-2">
                        <div class="flex-grow">
                            <span class="font-bold text-blue-700 mr-2 text-lg">[ ${rt.code} ]</span>
                            <span class="text-sm md:text-base text-gray-800">${rt.fullDesc}</span>
                            <div class="text-xs text-gray-500 mt-1">
                                表格顯示: <b>${rt.shortDesc}</b> | 每次計算: <b>${rt.score} 分</b> 
                            </div>
                        </div>
                        <button onclick="removeRecordType('${rt.code}')" class="text-red-500 hover:bg-red-50 border border-red-200 px-3 py-1.5 rounded transition-colors whitespace-nowrap w-full sm:w-auto">刪除項目</button>
                    </div>
                `;
            });
        }

        // 🌟 新增情況項目邏輯
        function addRecordType() {
            const code = document.getElementById('newTypeCode').value.trim();
            const fullDesc = document.getElementById('newTypeFullDesc').value.trim();
            const shortDesc = document.getElementById('newTypeShortDesc').value.trim();
            const score = parseFloat(document.getElementById('newTypeScore').value) || 0;
            const color = document.getElementById('newTypeColor').value;

            if(!code || !fullDesc || !shortDesc) {
                showToast('請填寫完整的代號與說明資料！', false);
                return;
            }

            if(recordTypes.find(rt => rt.code === code)) {
                showToast(`代號 [${code}] 已經存在，請使用不同的代號。`, false);
                return;
            }

            recordTypes.push({
                code: code,
                fullDesc: fullDesc,
                shortDesc: shortDesc,
                score: score,
                colorClass: color
            });

            saveRecordTypes();
            
            // 清空輸入框
            document.getElementById('newTypeCode').value = '';
            document.getElementById('newTypeFullDesc').value = '';
            document.getElementById('newTypeShortDesc').value = '';
            document.getElementById('newTypeScore').value = '';
            
            showToast('✅ 新情況項目已成功新增！');
        }

        // 🌟 刪除情況項目邏輯
        function removeRecordType(code) {
            if(!confirm(`⚠️ 確定要刪除項目 [${code}] 嗎？這將會從表單和統計表中隱藏這個項目的欄位。`)) return;
            recordTypes = recordTypes.filter(rt => rt.code !== code);
            saveRecordTypes();
            showToast('🗑️ 情況項目已刪除！');
        }

        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.className = `fixed top-20 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-xl z-50 text-white font-bold text-center w-max max-w-sm toast-transition ${isSuccess ? 'bg-green-500' : 'bg-red-500'}`;
            setTimeout(() => {
                toast.classList.remove('opacity-0', '-translate-y-5');
                toast.classList.add('opacity-100', 'translate-y-0');
            }, 10);
            if(toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', '-translate-y-5');
            }, 2000);
        }

        function setDefaultDate() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('recordDate').value = `${yyyy}-${mm}-${dd}`;
        }

        function changeQty(id, amount) {
            const input = document.getElementById(id);
            let val = parseInt(input.value) || 0;
            val += amount;
            if(val < 0) val = 0;
            input.value = val;
        }

        function switchTab(tabId) {
            if ((tabId === 'tab-record' || tabId === 'tab-settings') && !isVPAuthenticated) {
                const inputPass = prompt("此為受保護的頁面，請輸入密碼：");
                if (inputPass === VP_PASSWORD) {
                    isVPAuthenticated = true;
                } else {
                    if(inputPass !== null) alert("密碼錯誤，無法進入！");
                    return; 
                }
            }

            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-blue-800', 'ring-2', 'ring-white');
                btn.classList.add('bg-blue-700', 'md:bg-transparent');
            });
            const activeBtn = document.getElementById('btn-' + tabId);
            if(activeBtn) {
                activeBtn.classList.remove('bg-blue-700', 'md:bg-transparent');
                activeBtn.classList.add('bg-blue-800', 'ring-2', 'ring-white');
            }

            if(tabId === 'tab-view') {
                fetchData(true); 
            }
        }

        function toggleLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        async function fetchData(showLoading = true) {
            if(showLoading) toggleLoading(true);
            try {
                const response = await fetch(GAS_API_URL + '?action=getData');
                const data = await response.json();
                appData = data;
                document.getElementById('displayYear').innerText = `(${appData.year})`;
                updateTeacherDropdown();
                updateTeacherListSettings();
                renderSummaryTable();
            } catch (error) {
                console.error('讀取資料錯誤:', error);
                showToast('無法從伺服器讀取資料，請確認網路連線。', false);
            }
            if(showLoading) toggleLoading(false);
        }

        function updateTeacherDropdown() {
            const select = document.getElementById('teacherSelect');
            const currentValue = select.value; 
            
            select.innerHTML = '<option value="">請選擇...</option>';
            appData.teachers.forEach(teacher => {
                select.innerHTML += `<option value="${teacher}">${teacher}</option>`;
            });
            
            if (currentValue) {
                select.value = currentValue;
            }
        }

        function updateTeacherListSettings() {
            const list = document.getElementById('teacherList');
            list.innerHTML = '';
            appData.teachers.forEach(teacher => {
                list.innerHTML += `
                    <span class="bg-gray-100 border border-gray-300 px-3 py-1.5 rounded-full flex items-center shadow-sm text-sm md:text-base">
                        ${teacher}
                        <button onclick="removeTeacher('${teacher}')" class="ml-2 text-red-500 hover:text-red-700 font-bold text-lg leading-none">&times;</button>
                    </span>`;
            });
        }

        async function submitRecords(event) {
            event.preventDefault();
            const teacher = document.getElementById('teacherSelect').value;
            const date = document.getElementById('recordDate').value;

            if(!teacher || !date) return;

            const recordsToSubmit = [];
            // 🌟 根據動態設定產生要提交的類型
            const types = recordTypes.map(rt => rt.code);
            
            types.forEach(t => {
    const count = parseInt(document.getElementById(`qty_${t}`).value) || 0;
    if(count > 0) {
        // 🌟 找到這個項目的分數設定
        const typeDef = recordTypes.find(rt => rt.code === t);
        const scoreValue = typeDef ? parseFloat(typeDef.score) : 0;
        
        // 🌟 把 score 一起送出給 GAS
        recordsToSubmit.push({ date, teacher, type: t, count: count, score: scoreValue });
    }
});

            if(recordsToSubmit.length === 0) {
                showToast('請至少在一個情況項目中輸入數量！', false);
                return;
            }

            toggleLoading(true);
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'addRecords', records: recordsToSubmit })
                });
                const result = await response.json();
                
                toggleLoading(false); 
                
                if(result.success) {
                    showToast('✅ 記錄已成功新增！'); 
                    
                    document.getElementById('recordForm').reset();
                    setDefaultDate();
                    fetchData(false); 
                } else {
                    showToast('伺服器錯誤: ' + result.message, false);
                }
            } catch (error) {
                toggleLoading(false);
                showToast('儲存失敗，請檢查網路連線。', false);
            }
        }

        // 🌟 渲染：以動態配置更新總表計算
        function renderSummaryTable() {
            const tbody = document.getElementById('summaryTableBody');
            tbody.innerHTML = '';

            let summary = {};
            appData.teachers.forEach(t => {
                summary[t] = { total: 0 };
                recordTypes.forEach(rt => {
                    summary[t][rt.code] = 0; // 初始化所有自訂項目為 0
                });
            });

            // 🌟 分數統一由前端根據設定即時計算，給予最大的彈性！
            appData.records.forEach(rec => {
                if(summary[rec.teacher] && summary[rec.teacher][rec.type] !== undefined) {
                    summary[rec.teacher][rec.type]++;
                    
                    // 找出該類型的分數設定並加上去
                    const typeDef = recordTypes.find(rt => rt.code === rec.type);
                    if(typeDef) {
                        summary[rec.teacher].total += parseFloat(typeDef.score);
                    }
                }
            });

            appData.teachers.forEach(t => {
                const stat = summary[t];
                let trHtml = `
                    <tr class="border-b hover:bg-blue-50 transition-colors">
                        <td class="p-2 md:p-3 font-bold text-blue-600 cursor-pointer hover:underline whitespace-nowrap sticky left-0 bg-white/90 backdrop-blur-sm z-10 border-r md:border-r-0 border-gray-100" onclick="showTeacherDetails('${t}')">
                            <span class="flex items-center gap-1">🔍 ${t}</span>
                        </td>`;
                
                // 動態產生每一欄
                recordTypes.forEach(rt => {
                    let textColor = 'text-gray-600';
                    if(rt.score < 0) textColor = 'text-red-500';
                    if(rt.score > 0) textColor = 'text-green-600';
                    trHtml += `<td class="p-2 md:p-3 ${textColor} text-center md:text-left">${stat[rt.code]}</td>`;
                });

                trHtml += `<td class="p-2 md:p-3 font-bold text-center md:text-left ${stat.total < 0 ? 'text-red-600' : 'text-blue-600'}">${stat.total}</td></tr>`;
                
                tbody.innerHTML += trHtml;
            });
        }

        function showTeacherDetails(teacherName) {
            const modal = document.getElementById('teacherModal');
            const title = document.getElementById('modalTitle');
            const content = document.getElementById('modalContent');
            
            title.innerText = `${teacherName} 的記錄明細`;
            content.innerHTML = '';
            
            const tRecords = appData.records.filter(r => r.teacher === teacherName);
            
            // 🌟 轉換成動態的標籤
            const typeLabels = {};
            recordTypes.forEach(rt => {
                typeLabels[rt.code] = rt.fullDesc;
            });
            
            let html = '';
            let hasRecord = false;

            for(let key in typeLabels) {
                const typeRecs = tRecords.filter(r => r.type === key);
                typeRecs.sort((a, b) => new Date(a.date) - new Date(b.date));

                if(typeRecs.length > 0) {
                    hasRecord = true;
                    html += `
                        <div class="bg-gray-50 p-3 md:p-4 rounded-lg border border-gray-200">
                            <h4 class="font-bold text-gray-800 mb-2 border-b pb-2 text-sm md:text-base">${typeLabels[key]} <span class="text-xs md:text-sm font-normal text-gray-500 ml-2">(共 ${typeRecs.length} 次)</span></h4>
                            <div class="flex flex-wrap gap-2 mt-2">
                    `;
                    typeRecs.forEach(r => {
                        html += `
                        <span class="bg-white px-2 md:px-3 py-1 rounded text-xs md:text-sm shadow-sm border border-gray-300 text-gray-700 flex items-center gap-1 group">
                            ${r.date}
                            <button onclick="deleteSingleRecord('${teacherName}', '${key}', '${r.date}')" class="text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-full w-5 h-5 flex items-center justify-center font-bold transition-colors" title="刪除這筆記錄">&times;</button>
                        </span>`;
                    });
                    html += `</div></div>`;
                }
            }

            if(!hasRecord) {
                html = '<div class="text-center text-gray-500 py-8 text-sm md:text-base">目前沒有任何記錄</div>';
            }
            
            content.innerHTML = html;
            modal.classList.remove('hidden');
        }

        function closeTeacherModal() {
            document.getElementById('teacherModal').classList.add('hidden');
        }

        async function deleteSingleRecord(teacher, type, date) {
            if (!isVPAuthenticated) {
                alert("刪除記錄需要權限。請先切換至「記錄輸入」或「系統設定」輸入密碼解鎖！");
                return;
            }

            if(!confirm(`⚠️ 確定要刪除 ${teacher} 在 ${date} 的這筆記錄嗎？`)) return;

            toggleLoading(true);
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'deleteRecord', teacher: teacher, type: type, date: date })
                });
                const result = await response.json();
                
                toggleLoading(false);
                
                if(result.success) {
                    showToast('🗑️ 記錄已成功刪除！');
                    closeTeacherModal(); 
                    fetchData(false); 
                } else {
                    showToast('刪除失敗: ' + result.message, false);
                }
            } catch (error) {
                toggleLoading(false);
                showToast('刪除連線失敗，請檢查網路。', false);
            }
        }

        async function addTeacher() {
            const teacherName = document.getElementById('newTeacherInput').value.trim();
            if(!teacherName) return;
            toggleLoading(true);
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'addTeacher', teacherName })
                });
                const result = await response.json();
                if(result.success) {
                    showToast('✅ 教師已成功新增！');
                    document.getElementById('newTeacherInput').value = '';
                    await fetchData();
                }
            } catch (error) {}
            toggleLoading(false);
        }

        async function removeTeacher(teacherName) {
            if(!confirm(`確定要移除教師「${teacherName}」嗎？`)) return;
            toggleLoading(true);
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'removeTeacher', teacherName })
                });
                const result = await response.json();
                if(result.success) {
                    showToast('🗑️ 教師已移除！');
                    await fetchData();
                }
            } catch (error) {}
            toggleLoading(false);
        }

        async function resetYear() {
            const newYear = document.getElementById('newYearInput').value.trim();
            if(!newYear) return;
            if(!confirm(`警告：確定開啟新學年「${newYear}」？舊記錄將被完全清除！`)) return;
            toggleLoading(true);
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'resetYear', newYear })
                });
                const result = await response.json();
                if(result.success) {
                    showToast('✨ 新學年已成功設定！');
                    document.getElementById('newYearInput').value = '';
                    await fetchData();
                }
            } catch (error) {}
            toggleLoading(false);
        }
    </script>
</body>
</html>
